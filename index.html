<!DOCTYPE html>
<html>
<head>
    <title>Azure Cleaning Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0F766E 0%, #14B8A6 100%);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 {
            color: #0F766E;
            margin-bottom: 12px;
            font-size: 28px;
        }
        p {
            color: #475569;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .button {
            display: inline-block;
            padding: 12px 32px;
            margin: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid;
        }
        .btn-admin {
            background: linear-gradient(135deg, #0F766E 0%, #14B8A6 100%);
            color: white;
            border-color: #0F766E;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }
        .btn-cleaner {
            background: white;
            color: #0F766E;
            border-color: #0F766E;
        }
        .btn-cleaner:hover {
            background: #F8FAFC;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Azure Cleaning</h1>
        <p>Select your dashboard below</p>
        <a href="/azure-cleaning-dashboards/admin.html" class="button btn-admin">🔐 Admin Dashboard</a>
        <a href="/azure-cleaning-dashboards/cleaner.html" class="button btn-cleaner">👷 Cleaner Dashboard</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Cleaning - Cleaner Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0F766E;
            --primary-light: #14B8A6;
            --primary-dark: #0D5A52;
            --accent: #06B6D4;
            --success: #10B981;
            --danger: #EF4444;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 28px 20px;
            box-shadow: 0 4px 20px rgba(15, 118, 110, 0.15);
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.95;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 20px;
        }
        
        .login-section {
            background: var(--surface);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 28px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            text-align: center;
        }
        
        .login-section h2 {
            font-size: 22px;
            margin-bottom: 12px;
            color: var(--text-primary);
            font-weight: 700;
        }
        
        .login-section p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        
        .login-form input {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }
        
        .login-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(15, 118, 110, 0.3);
        }
        
        .jobs-section {
            display: none;
        }
        
        .jobs-section.active {
            display: block;
        }
        
        .cleaner-header {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cleaner-info h2 {
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-weight: 700;
        }
        
        .cleaner-info p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        
        .job-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        
        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.12);
            border-color: var(--primary);
        }
        
        .job-card.accepted {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(20, 184, 166, 0.05) 100%);
            border-color: var(--success);
        }
        
        .job-id {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .job-card h3 {
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 700;
        }
        
        .job-detail {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .job-label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            min-width: 90px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .job-value {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }
        
        .job-pay {
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.1) 0%, rgba(20, 184, 166, 0.1) 100%);
            border-left: 4px solid var(--primary);
            padding: 14px;
            border-radius: 8px;
            margin: 16px 0;
        }
        
        .job-pay-label {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .job-pay-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .accept-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(15, 118, 110, 0.2);
        }
        
        .accept-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }
        
        .accept-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }
        
        .accepted-badge {
            display: inline-block;
            background: var(--success);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .no-jobs {
            background: var(--surface);
            border-radius: 12px;
            padding: 48px 20px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            grid-column: 1 / -1;
        }
        
        .no-jobs-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        .no-jobs p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .refresh-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(15, 118, 110, 0.2);
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }
        
        .info-banner {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, rgba(20, 184, 166, 0.1) 100%);
            border-left: 4px solid var(--accent);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            
            .cleaner-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
            
            .jobs-grid {
                grid-template-columns: 1fr;
            }
            
            .login-section {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <h1>Azure Cleaning</h1>
        <p>Available Jobs • Professional Cleaning Services</p>
    </div>
    
    <div class="container">
        <!-- LOGIN SECTION -->
        <div class="login-section" id="loginSection">
            <h2>Welcome to Azure Cleaning</h2>
            <p>Sign in with your email to see available jobs in your service area</p>
            <div class="login-form">
                <input type="email" id="cleanerEmail" placeholder="Enter your email">
                <button class="login-btn" onclick="loginCleaner()">Sign In</button>
            </div>
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 16px;">Use the email registered with Azure Cleaning</p>
        </div>
        
        <!-- JOBS SECTION -->
        <div class="jobs-section" id="jobsSection">
            <div class="cleaner-header">
                <div class="cleaner-info">
                    <h2 id="cleanerName">Welcome!</h2>
                    <p id="cleanerArea">Service Area: Loading...</p>
                </div>
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
            
            <div class="info-banner" id="infoBanner">
                Loading available jobs in your service area...
            </div>
            
            <div class="jobs-grid" id="jobsGrid">
                <!-- Jobs will appear here -->
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // MOCK DATA (In production, this would read from Google Sheets)
        // ============================================
        
        const mockCleaners = [
            {
                name: "Nikole",
                email: "nikole.email@gmail.com",
                areas: "Salt Lake City, Draper, Lehi"
            },
            {
                name: "Fernando",
                email: "fernando.email@gmail.com",
                areas: "Summit County, Park City"
            }
        ];
        
        const mockJobs = [
            {
                id: "JOB-001",
                client: "John Smith",
                address: "123 Main St, Salt Lake City",
                city: "Salt Lake City",
                date: "January 15, 2025",
                time: "10:00 AM",
                frequency: "Weekly",
                pay: 82.50,
                status: "available"
            },
            {
                id: "JOB-002",
                client: "Sarah Johnson",
                address: "456 Oak Ave, Draper",
                city: "Draper",
                date: "January 16, 2025",
                time: "2:00 PM",
                frequency: "Bi-weekly",
                pay: 110.00,
                status: "available"
            },
            {
                id: "JOB-003",
                client: "Mike Wilson",
                address: "789 Summit Dr, Park City",
                city: "Park City",
                date: "January 17, 2025",
                time: "9:00 AM",
                frequency: "Weekly",
                pay: 99.00,
                status: "available"
            }
        ];
        
        // ============================================
        // LOGIN FUNCTION
        // ============================================
        
        function loginCleaner() {
            const email = document.getElementById('cleanerEmail').value;
            
            if (!email) {
                alert('Please enter your email');
                return;
            }
            
            const cleaner = mockCleaners.find(c => c.email.toLowerCase() === email.toLowerCase());
            
            if (!cleaner) {
                alert('Email not found. Please check your email address.');
                return;
            }
            
            // Store cleaner info in session
            sessionStorage.setItem('cleanerName', cleaner.name);
            sessionStorage.setItem('cleanerEmail', cleaner.email);
            sessionStorage.setItem('cleanerAreas', cleaner.areas);
            
            // Show jobs section
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('jobsSection').classList.add('active');
            
            // Update header
            document.getElementById('cleanerName').textContent = `Hi ${cleaner.name}! 👋`;
            document.getElementById('cleanerArea').textContent = `Service Areas: ${cleaner.areas}`;
            
            // Load available jobs
            loadAvailableJobs(cleaner.name, cleaner.areas);
        }
        
        // ============================================
        // LOAD JOBS
        // ============================================
        
        function loadAvailableJobs(cleanerName, serviceAreas) {
            // Filter jobs by cleaner's service areas
            const areas = serviceAreas.split(',').map(a => a.trim().toLowerCase());
            const availableJobs = mockJobs.filter(job => 
                areas.some(area => job.city.toLowerCase().includes(area))
            );
            
            const jobsGrid = document.getElementById('jobsGrid');
            
            if (availableJobs.length === 0) {
                jobsGrid.innerHTML = `
                    <div class="no-jobs">
                        <div class="no-jobs-icon">📭</div>
                        <p>No available jobs in your service area right now.</p>
                        <p style="font-size: 12px; margin-top: 10px; color: var(--text-muted);">
                            Check back soon or contact us if you'd like to expand your service area.
                        </p>
                        <button class="refresh-btn" onclick="loadAvailableJobs(
                            sessionStorage.getItem('cleanerName'),
                            sessionStorage.getItem('cleanerAreas')
                        )">🔄 Refresh</button>
                    </div>
                `;
                return;
            }
            
            document.getElementById('infoBanner').textContent = `${availableJobs.length} job${availableJobs.length !== 1 ? 's' : ''} available in your service area`;
            
            jobsGrid.innerHTML = availableJobs.map(job => `
                <div class="job-card ${job.status === 'accepted' ? 'accepted' : ''}">
                    <div class="job-id">${job.id}</div>
                    ${job.status === 'accepted' ? '<div class="accepted-badge">✓ You Accepted</div>' : ''}
                    
                    <h3>${job.client}</h3>
                    
                    <div class="job-detail">
                        <span class="job-label">📍 Address</span>
                        <span class="job-value">${job.address}</span>
                    </div>
                    
                    <div class="job-detail">
                        <span class="job-label">📅 Date</span>
                        <span class="job-value">${job.date}</span>
                    </div>
                    
                    <div class="job-detail">
                        <span class="job-label">⏰ Time</span>
                        <span class="job-value">${job.time}</span>
                    </div>
                    
                    <div class="job-detail">
                        <span class="job-label">🔄 Type</span>
                        <span class="job-value">${job.frequency}</span>
                    </div>
                    
                    <div class="job-pay">
                        <div class="job-pay-label">Your Pay</div>
                        <div class="job-pay-amount">$${job.pay.toFixed(2)}</div>
                    </div>
                    
                    <button 
                        class="accept-btn" 
                        onclick="acceptJob('${job.id}', '${job.client}')"
                        ${job.status === 'accepted' ? 'disabled' : ''}
                    >
                        ${job.status === 'accepted' ? '✓ Accepted' : 'Accept This Job'}
                    </button>
                </div>
            `).join('');
        }
        
        // ============================================
        // ACCEPT JOB
        // ============================================
        
        function acceptJob(jobId, clientName) {
            if (!confirm(`Accept job from ${clientName}?`)) {
                return;
            }
            
            const cleanerName = sessionStorage.getItem('cleanerName');
            
            alert(`✓ Job ${jobId} accepted!\n\nYou're all set for ${clientName}.\n\nAzure Cleaning will send you a confirmation email.`);
            
            // Reload to show accepted status
            loadAvailableJobs(cleanerName, sessionStorage.getItem('cleanerAreas'));
        }
        
        // ============================================
        // LOGOUT
        // ============================================
        
        function logout() {
            if (confirm('Sign out?')) {
                sessionStorage.clear();
                document.getElementById('jobsSection').classList.remove('active');
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('cleanerEmail').value = '';
            }
        }
        
        // ============================================
        // AUTO-LOGIN IF SESSION EXISTS
        // ============================================
        
        window.addEventListener('load', () => {
            const cleanerEmail = sessionStorage.getItem('cleanerEmail');
            if (cleanerEmail) {
                document.getElementById('cleanerEmail').value = cleanerEmail;
                loginCleaner();
            }
        });
    </script>
</body>
</html>

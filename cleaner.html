<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Cleaning - Cleaner Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0F766E;
            --primary-light: #14B8A6;
            --success: #10B981;
            --danger: #EF4444;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--background);
            color: var(--text-primary);
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 28px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 20px;
        }
        
        .login-section {
            background: var(--surface);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .login-section h2 {
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }
        
        .login-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-left: 4px solid var(--danger);
            color: #991b1b;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .jobs-section {
            display: none;
        }
        
        .jobs-section.active {
            display: block;
        }
        
        .cleaner-header {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cleaner-info h2 {
            font-size: 20px;
            margin-bottom: 6px;
            font-weight: 700;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        
        .job-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        
        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.12);
            border-color: var(--primary);
        }
        
        .job-id {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .job-card h3 {
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 700;
        }
        
        .job-detail {
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
        }
        
        .job-label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            min-width: 90px;
            text-transform: uppercase;
        }
        
        .job-value {
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .job-pay {
            background: rgba(15, 118, 110, 0.1);
            border-left: 4px solid var(--primary);
            padding: 14px;
            border-radius: 8px;
            margin: 16px 0;
        }
        
        .job-pay-label {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .job-pay-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .accept-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(15, 118, 110, 0.2);
        }
        
        .accept-btn:hover {
            transform: translateY(-2px);
        }
        
        .no-jobs {
            background: var(--surface);
            border-radius: 12px;
            padding: 48px 20px;
            text-align: center;
            border: 1px solid var(--border);
            grid-column: 1 / -1;
        }
        
        .loading {
            text-align: center;
            color: var(--text-secondary);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Azure Cleaning</h1>
        <p>Available Jobs • Professional Cleaning Services</p>
    </div>
    
    <div class="container">
        <div class="login-section" id="loginSection">
            <h2>Welcome to Azure Cleaning</h2>
            <p style="margin-bottom: 20px; color: var(--text-secondary);">Sign in with your email to see available jobs</p>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="cleanerEmail" placeholder="your@email.com">
            </div>
            
            <button class="login-btn" onclick="loginCleaner()">Sign In</button>
        </div>
        
        <div class="jobs-section" id="jobsSection">
            <div class="cleaner-header">
                <div class="cleaner-info">
                    <h2 id="cleanerName">Welcome!</h2>
                    <p id="cleanerArea">Service Areas: Loading...</p>
                </div>
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
            
            <div class="jobs-grid" id="jobsGrid">
                <div class="no-jobs loading">Loading your jobs...</div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://script.googleapis.com/macros/s/AKfycbwgeKTQIdwGkpulKhzJfYGjxm8VI5VAElytCSONGEiJ_BieHRmXv08PfvbPY3JtkxKLJQ/exec';
        
        async function loginCleaner() {
            const email = document.getElementById('cleanerEmail').value;
            const errorMessage = document.getElementById('errorMessage');
            
            if (!email) {
                errorMessage.textContent = '❌ Please enter your email';
                errorMessage.classList.add('show');
                return;
            }
            
            try {
                errorMessage.classList.remove('show');
                
                const response = await fetch(`${API_URL}?action=getCleaner&email=${encodeURIComponent(email)}`);
                const cleanerData = await response.json();
                
                if (cleanerData.error) {
                    errorMessage.textContent = '❌ Email not found. Please check your email address.';
                    errorMessage.classList.add('show');
                    return;
                }
                
                localStorage.setItem('cleanerName', cleanerData.name);
                localStorage.setItem('cleanerEmail', cleanerData.email);
                localStorage.setItem('cleanerAreas', cleanerData.areas);
                
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('jobsSection').classList.add('active');
                
                document.getElementById('cleanerName').textContent = `Hi ${cleanerData.name}! 👋`;
                document.getElementById('cleanerArea').textContent = `Service Areas: ${cleanerData.areas}`;
                
                await loadJobs(cleanerData.email);
                
            } catch (error) {
                errorMessage.textContent = '❌ Error: ' + error.message;
                errorMessage.classList.add('show');
            }
        }
        
        async function loadJobs(email) {
            try {
                const response = await fetch(`${API_URL}?action=getJobs&email=${encodeURIComponent(email)}`);
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('jobsGrid').innerHTML = '<div class="no-jobs">❌ ' + data.error + '</div>';
                    return;
                }
                
                const jobs = data.jobs || [];
                
                if (jobs.length === 0) {
                    document.getElementById('jobsGrid').innerHTML = '<div class="no-jobs"><p>No available jobs in your service area right now.</p></div>';
                    return;
                }
                
                document.getElementById('jobsGrid').innerHTML = jobs.map(job => `
                    <div class="job-card">
                        <div class="job-id">${job.jobId}</div>
                        <h3>${job.client}</h3>
                        
                        <div class="job-detail">
                            <span class="job-label">📍 Address</span>
                            <span class="job-value">${job.address}</span>
                        </div>
                        
                        <div class="job-detail">
                            <span class="job-label">📅 Date</span>
                            <span class="job-value">${job.date}</span>
                        </div>
                        
                        <div class="job-detail">
                            <span class="job-label">⏰ Time</span>
                            <span class="job-value">${job.time}</span>
                        </div>
                        
                        <div class="job-detail">
                            <span class="job-label">🔄 Type</span>
                            <span class="job-value">${job.frequency}</span>
                        </div>
                        
                        <div class="job-pay">
                            <div class="job-pay-label">Your Pay (55%)</div>
                            <div class="job-pay-amount">$${parseFloat(job.price).toFixed(2)}</div>
                        </div>
                        
                        <button class="accept-btn" onclick="acceptJob('${job.jobId}', '${job.client}')">
                            Accept This Job
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('jobsGrid').innerHTML = '<div class="no-jobs">❌ Error loading jobs: ' + error.message + '</div>';
            }
        }
        
        function acceptJob(jobId, clientName) {
            if (confirm(`Accept job from ${clientName}?`)) {
                alert(`✓ Job ${jobId} accepted!\n\nAzure Cleaning will send you a confirmation email.`);
            }
        }
        
        function logout() {
            if (confirm('Sign out?')) {
                localStorage.removeItem('cleanerName');
                localStorage.removeItem('cleanerEmail');
                localStorage.removeItem('cleanerAreas');
                document.getElementById('jobsSection').classList.remove('active');
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('cleanerEmail').value = '';
            }
        }
        
        window.addEventListener('load', () => {
            const cleanerName = localStorage.getItem('cleanerName');
            if (cleanerName) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('jobsSection').classList.add('active');
                document.getElementById('cleanerName').textContent = `Hi ${cleanerName}! 👋`;
                document.getElementById('cleanerArea').textContent = `Service Areas: ${localStorage.getItem('cleanerAreas')}`;
            }
        });
    </script>
</body>
</html>
